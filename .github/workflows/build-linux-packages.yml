name: build-linux-packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' scripts/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' scripts/*.sh
          sed -i 's/\r$//' packaging/hooks/agent/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/agent/*.sh
          sed -i 's/\r$//' packaging/hooks/receiver/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/receiver/*.sh
          chmod +x scripts/*.sh packaging/hooks/agent/*.sh packaging/hooks/receiver/*.sh

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-venv
          sudo gem install --no-document fpm

      - name: Build DEB
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          chmod +x scripts/build_linux.sh
          scripts/build_linux.sh "${VERSION}" artifacts deb

      - name: Generate SHA256 (DEB)
        run: |
          sha256sum artifacts/*.deb > artifacts/SHA256SUMS-deb.txt

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: |
            artifacts/*.deb
            artifacts/SHA256SUMS-deb.txt

  rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install git
        run: dnf install -y git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' scripts/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' scripts/*.sh
          sed -i 's/\r$//' packaging/hooks/agent/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/agent/*.sh
          sed -i 's/\r$//' packaging/hooks/receiver/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/receiver/*.sh
          chmod +x scripts/*.sh packaging/hooks/agent/*.sh packaging/hooks/receiver/*.sh

      - name: Install system deps
        run: |
          dnf install -y python3 python3-pip gcc gcc-c++ make ruby ruby-devel rubygems rpm-build
          gem install --no-document fpm

      - name: Build RPM
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          chmod +x scripts/build_linux.sh
          scripts/build_linux.sh "${VERSION}" artifacts rpm

      - name: Generate SHA256 (RPM)
        run: |
          sha256sum artifacts/*.rpm > artifacts/SHA256SUMS-rpm.txt

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: |
            artifacts/*.rpm
            artifacts/SHA256SUMS-rpm.txt

  rpm_centos7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' scripts/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' scripts/*.sh
          sed -i 's/\r$//' packaging/hooks/agent/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/agent/*.sh
          sed -i 's/\r$//' packaging/hooks/receiver/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/receiver/*.sh
          chmod +x scripts/*.sh packaging/hooks/agent/*.sh packaging/hooks/receiver/*.sh

      - name: Build RPM (CentOS 7 / glibc 2.17 in manylinux2014)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash -lc "yum install -y gcc gcc-c++ make ruby ruby-devel rubygems rpm-build && gem install --no-document fpm && PYTHON_BIN=/opt/python/cp39-cp39/bin/python SKIP_VENV=1 FPM_ITERATION=1.el7 scripts/build_linux.sh ${VERSION} artifacts rpm"

      - name: Generate SHA256 (RPM CentOS7)
        run: |
          sha256sum artifacts/*.rpm > artifacts/SHA256SUMS-rpm-centos7.txt

      - name: Upload RPM CentOS7 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-centos7-packages
          path: |
            artifacts/*.rpm
            artifacts/SHA256SUMS-rpm-centos7.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [deb, rpm, rpm_centos7]
    steps:
      - name: Download Debian artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: release-artifacts/deb

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-packages
          path: release-artifacts/rpm

      - name: Download RPM CentOS7 artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-centos7-packages
          path: release-artifacts/rpm-centos7

      - name: Build combined checksum file
        run: |
          cat release-artifacts/deb/SHA256SUMS-deb.txt \
              release-artifacts/rpm/SHA256SUMS-rpm.txt \
              release-artifacts/rpm-centos7/SHA256SUMS-rpm-centos7.txt \
              > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/deb/*.deb
            release-artifacts/rpm/*.rpm
            release-artifacts/rpm-centos7/*.rpm
            release-artifacts/deb/SHA256SUMS-deb.txt
            release-artifacts/rpm/SHA256SUMS-rpm.txt
            release-artifacts/rpm-centos7/SHA256SUMS-rpm-centos7.txt
            release-artifacts/SHA256SUMS.txt
          generate_release_notes: true
