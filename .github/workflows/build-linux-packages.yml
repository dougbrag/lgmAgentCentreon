name: build-linux-packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' scripts/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' scripts/*.sh
          sed -i 's/\r$//' packaging/hooks/agent/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/agent/*.sh
          sed -i 's/\r$//' packaging/hooks/receiver/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/receiver/*.sh
          chmod +x scripts/*.sh packaging/hooks/agent/*.sh packaging/hooks/receiver/*.sh

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential python3-venv
          sudo gem install --no-document fpm

      - name: Build DEB
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          chmod +x scripts/build_linux.sh
          scripts/build_linux.sh "${VERSION}" artifacts deb

      - name: Generate SHA256 (DEB)
        run: |
          sha256sum artifacts/*.deb > artifacts/SHA256SUMS-deb.txt

      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: |
            artifacts/*.deb
            artifacts/SHA256SUMS-deb.txt

  rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    steps:
      - name: Install git
        run: dnf install -y git

      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' scripts/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' scripts/*.sh
          sed -i 's/\r$//' packaging/hooks/agent/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/agent/*.sh
          sed -i 's/\r$//' packaging/hooks/receiver/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/receiver/*.sh
          chmod +x scripts/*.sh packaging/hooks/agent/*.sh packaging/hooks/receiver/*.sh

      - name: Install system deps
        run: |
          dnf install -y python3 python3-pip gcc gcc-c++ make ruby ruby-devel rubygems rpm-build
          gem install --no-document fpm

      - name: Build RPM
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          chmod +x scripts/build_linux.sh
          scripts/build_linux.sh "${VERSION}" artifacts rpm

      - name: Generate SHA256 (RPM)
        run: |
          sha256sum artifacts/*.rpm > artifacts/SHA256SUMS-rpm.txt

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: |
            artifacts/*.rpm
            artifacts/SHA256SUMS-rpm.txt

  rpm_centos7:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize shell script line endings
        run: |
          sed -i 's/\r$//' scripts/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' scripts/*.sh
          sed -i 's/\r$//' packaging/hooks/agent/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/agent/*.sh
          sed -i 's/\r$//' packaging/hooks/receiver/*.sh
          sed -i '1s/^\xEF\xBB\xBF//' packaging/hooks/receiver/*.sh
          chmod +x scripts/*.sh packaging/hooks/agent/*.sh packaging/hooks/receiver/*.sh

      - name: Build CentOS7-compatible binaries (centos7 + rh-python38)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          cat > /tmp/build-c7-in-container.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          cat > /etc/yum.repos.d/CentOS-Base.repo <<'EOF'
          [base]
          name=CentOS-7.9.2009 - Base
          baseurl=http://vault.centos.org/7.9.2009/os/$basearch/
          enabled=1
          gpgcheck=0

          [updates]
          name=CentOS-7.9.2009 - Updates
          baseurl=http://vault.centos.org/7.9.2009/updates/$basearch/
          enabled=1
          gpgcheck=0

          [extras]
          name=CentOS-7.9.2009 - Extras
          baseurl=http://vault.centos.org/7.9.2009/extras/$basearch/
          enabled=1
          gpgcheck=0
          EOF

          yum clean all
          yum makecache
          cat > /etc/yum.repos.d/CentOS-SCLo-scl-rh.repo <<'EOF'
          [centos-sclo-rh]
          name=CentOS-7.9.2009 - SCLo rh
          baseurl=http://vault.centos.org/7.9.2009/sclo/$basearch/rh/
          enabled=1
          gpgcheck=0

          [centos-sclo-sclo]
          name=CentOS-7.9.2009 - SCLo sclo
          baseurl=http://vault.centos.org/7.9.2009/sclo/$basearch/sclo/
          enabled=1
          gpgcheck=0
          EOF

          yum clean all
          yum makecache
          yum install -y rh-python38 rh-python38-python-devel gcc gcc-c++ make openssl-devel bzip2-devel libffi-devel zlib-devel

          set +u
          source /opt/rh/rh-python38/enable
          set -u
          python3 -m ensurepip --upgrade
          python3 -m pip install --upgrade pip
          python3 -m pip install cryptography fastapi psutil pydantic requests uvicorn pyinstaller

          python3 -m PyInstaller --noconfirm --clean --onefile --name lgm-agent \
            --distpath /work/dist --workpath /work/build/linux/agent-c7 --specpath /work/build/linux/spec-c7 \
            /work/agent/lgm_agent.py

          python3 -m PyInstaller --noconfirm --clean --onefile --name lgm-receiver \
            --distpath /work/dist --workpath /work/build/linux/receiver-c7 --specpath /work/build/linux/spec-c7 \
            /work/receiver/lgm_receiver.py

          chown -R "${HOST_UID}:${HOST_GID}" /work/dist /work/build/linux/agent-c7 /work/build/linux/receiver-c7 /work/build/linux/spec-c7 || true
          SCRIPT

          chmod +x /tmp/build-c7-in-container.sh
          docker run --rm \
            --user 0:0 \
            -e HOME=/tmp \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/work" \
            -v /tmp/build-c7-in-container.sh:/tmp/build-c7-in-container.sh:ro \
            -w /work \
            centos:7 \
            /bin/bash /tmp/build-c7-in-container.sh

      - name: Install packaging deps on runner
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev build-essential
          sudo gem install --no-document fpm

      - name: Build RPM (CentOS 7 / glibc 2.17)
        env:
          SKIP_BUILD: "1"
          FPM_ITERATION: "1.el7"
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "${VERSION}" ] || [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then VERSION="0.0.0-dev"; fi
          chmod +x scripts/build_linux.sh
          scripts/build_linux.sh "${VERSION}" artifacts rpm

      - name: Generate SHA256 (RPM CentOS7)
        run: |
          sha256sum artifacts/*.rpm > artifacts/SHA256SUMS-rpm-centos7.txt

      - name: Upload RPM CentOS7 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-centos7-packages
          path: |
            artifacts/*.rpm
            artifacts/SHA256SUMS-rpm-centos7.txt

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [deb, rpm, rpm_centos7]
    steps:
      - name: Download Debian artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: release-artifacts/deb

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-packages
          path: release-artifacts/rpm

      - name: Download RPM CentOS7 artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-centos7-packages
          path: release-artifacts/rpm-centos7

      - name: Build combined checksum file
        run: |
          cat release-artifacts/deb/SHA256SUMS-deb.txt \
              release-artifacts/rpm/SHA256SUMS-rpm.txt \
              release-artifacts/rpm-centos7/SHA256SUMS-rpm-centos7.txt \
              > release-artifacts/SHA256SUMS.txt

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/deb/*.deb
            release-artifacts/rpm/*.rpm
            release-artifacts/rpm-centos7/*.rpm
            release-artifacts/deb/SHA256SUMS-deb.txt
            release-artifacts/rpm/SHA256SUMS-rpm.txt
            release-artifacts/rpm-centos7/SHA256SUMS-rpm-centos7.txt
            release-artifacts/SHA256SUMS.txt
          generate_release_notes: true

