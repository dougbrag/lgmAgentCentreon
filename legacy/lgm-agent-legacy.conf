# LGM Legacy Agent configuration
# Keep this file with mode 600 (contains endpoint/token path details).

RECEIVER_URL="https://receiver.example.com:8443"
TOKEN_FILE="/etc/lgm-agent/token"

# Labels sent in /register
ROLE_LABEL="linux"
ENV_LABEL="production"
OS_NAME="linux"

# true or false
VERIFY_TLS="true"
TIMEOUT_SECONDS="10"

# Optional custom paths
LOG_FILE="/var/log/lgm-agent-legacy.log"
STATE_DIR="/var/lib/lgm-agent-legacy"
REGISTER_STATE_FILE="/var/lib/lgm-agent-legacy/registered"
LOCK_FILE="/var/run/lgm-agent-legacy.lock"
